# Situ - Situation Room Configuration
# Sources and settings for automated intelligence gathering

schedule:
  daily_digest: "0 8 * * *" # 8am daily

report:
  output_dir: reports
  format: markdown

# Topics of interest for relevance filtering
interests:
  - zero-knowledge proofs
  - privacy-preserving technology
  - MPC / FHE / TEE
  - distributed systems
  - cryptography research
  - ethereum / L2 / rollups
  - MEV / block building / PBS
  - agentic commerce / machine payments
  - peer-to-peer networking
  - Rust ecosystem
  - local-first software

sources:
  dashboards:
    - name: MPPScan
      url: https://www.mppscan.com
      category: agentic-commerce
      description: Activity scanner for the Machine Payments Protocol

    - name: x402scan
      url: https://www.x402scan.com
      category: agentic-commerce
      description: Activity scanner for the x402 protocol

  news:
